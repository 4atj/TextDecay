<!DOCTYPE html>
<html>
<head>
  <title>Cognitive Degradation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      width: 260px;
      padding: 12px;
      background: #0f0f0f;
      color: #fff;
    }

    h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    label {
      font-size: 12px;
      opacity: 0.8;
    }

    input {
      width: 70px;
      padding: 4px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: white;
      border-radius: 6px;
      outline: none;
    }

    #apply {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      background: #222;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #apply:hover {
      background: #2a2a2a;
    }

    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }

    .toggle-label {
      font-size: 12px;
      opacity: 0.7;
    }

    #toggle {
      width: 140px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid #333;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.15s ease;
      white-space: nowrap;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <h3>TextDecay</h3>

  <div class="row">
    <label>Vowels %</label>
    <input id="vowels" type="number" min="0" max="100" value="0" />
  </div>

  <div class="row">
    <label>Letters %</label>
    <input id="letters" type="number" min="0" max="100" value="0" />
  </div>

  <div class="row">
    <label>Words %</label>
    <input id="words" type="number" min="0" max="100" value="0" />
  </div>

  <div class="row">
    <label>Filter lowercase only</label>
    <input id="lowercaseOnly" type="checkbox" />
  </div>

  <button id="apply">Apply</button>

  <div class="toggle-container">
    <div class="toggle-label">View Mode</div>
    <button id="toggle">
      Show Original
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
